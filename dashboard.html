<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nirdesha Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <h1>Nirdesha</h1>

        <p id="welcome">
            Welcome 👋
        </p>


        <div class="cards">

            <div class="card">
                <h2>🪜 Create Roadmap</h2>
                <p>
                    Turn your goals into a clear path.
                </p>

                <button>
                    Create
                </button>
            </div>


            <div class="card">
                <h2>📚 My Roadmaps</h2>
                <p>
                    View your saved roadmaps.
                </p>

                <button>
                    View
                </button>
            </div>


            <div class="card">
                <h2>👤 Profile</h2>
                <p>
                    Manage your account.
                </p>

                <button>
                    Open
                </button>
            </div>

        </div>


        <button id="logoutBtn">
            Logout
        </button>


    </div>


<script type="module" src="dashboard.js"></script>

</body>

</html>
