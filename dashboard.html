<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nirdesha | Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="dashboard">

        <header>

            <h1>Nirdesha</h1>

            <p id="welcome">
                Welcome back.
            </p>

        </header>


        <main>

            <section class="hero">

                <h2>
                    Your goals deserve direction.
                </h2>

                <p>
                    Create structured roadmaps and turn ambitions into action.
                </p>

            </section>


            <section class="actions">


                <div class="card">

                    <div>
                        <h3>Create Roadmap</h3>

                        <p>
                            Transform your goal into a step-by-step journey.
                        </p>
                    </div>

                    <button>
                        →
                    </button>

                </div>



                <div class="card">

                    <div>
                        <h3>My Roadmaps</h3>

                        <p>
                            View and continue your saved journeys.
                        </p>
                    </div>

                    <button>
                        →
                    </button>

                </div>



                <div class="card">

                    <div>
                        <h3>Profile</h3>

                        <p>
                            Manage your Nirdesha account.
                        </p>
                    </div>

                    <button>
                        →
                    </button>

                </div>


            </section>


        </main>


        <button id="logoutBtn">
            Logout
        </button>


    </div>


<script type="module" src="dashboard.js"></script>

</body>

</html>
